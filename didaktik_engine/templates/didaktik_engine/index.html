<!DOCTYPE html>
<html>
<head>
    <title>Gemini Didaktik-Tool</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 200px; margin-bottom: 20px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        .result { background: #f4f4f4; padding: 20px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Didaktik-Assistent (Gemini 2.5 Flash)</h1>
    <form method="post">
        {% csrf_token %}
        <label>Füge hier den Inhalt ein (z.B. ein Transkript):</label>
        <textarea name="user_input" placeholder="Hier Text einfügen..."></textarea>
        <button type="submit">Analysieren</button>
    </form>

    {% if result %}
        <div class="result">
            <h2>Ergebnis:</h2>
            {{ result }}
        </div>
    {% endif %}
</body>
</html>
