<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Didaktik-Assistent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .chat-card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="text-center mb-4">
                <h1 class="display-5 fw-bold text-primary">Didaktik-Assistent</h1>
                <p class="lead text-muted">Powered by Gemini 2.5 Flash</p>
            </div>

            <div class="card chat-card mb-4">
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="userInput" class="form-label fw-semibold">Inhalt zur Analyse:</label>
                            <textarea class="form-control" name="user_input" id="userInput" rows="6" placeholder="Füge hier das Transkript oder den Text ein..."></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Jetzt analysieren</button>
                        </div>
                    </form>
                </div>
            </div>

            {% if result %}
            <div class="card chat-card border-success">
                <div class="card-header bg-success text-white fw-bold">
                    Analyse-Ergebnis
                </div>
                <div class="card-body p-4 bg-white" style="white-space: pre-wrap;">
                    {{ result }}
                </div>
            </div>
            {% endif %}

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
