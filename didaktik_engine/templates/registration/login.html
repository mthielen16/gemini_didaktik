<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobbi | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #2c3e50; display: flex; align-items: center; min-height: 100vh; }
        .login-card { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .btn-dobbi { background-color: #18bc9c; border: none; color: white; }
        .btn-dobbi:hover { background-color: #14a085; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card p-4">
                <div class="text-center mb-4">
                    <h1 class="fw-bold text-primary">Dobbi</h1>
                    <p class="text-muted">Didaktik-Gutachter Login</p>
                </div>

                {% if form.errors %}
                <div class="alert alert-danger py-2 small">
                    Login fehlgeschlagen. Daten prüfen.
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Benutzername</label>
                        <input type="text" name="username" class="form-control" placeholder="Name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Passwort</label>
                        <input type="password" name="password" class="form-control" placeholder="Passwort">
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-dobbi btn-lg">Anmelden</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
